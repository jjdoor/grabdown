<svg viewBox="0 0 1280 800" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif">
  <rect width="1280" height="800" fill="#f6f8fa"/>

  <!-- header -->
  <g transform="translate(640,96)" text-anchor="middle">
    <text y="0" font-size="50" font-weight="800" fill="#1f2328">Select anything &#8594; clean Markdown</text>
    <text y="46" font-size="25" fill="#656d76">Right-click, and it&#8217;s on your clipboard. Zero dependencies, zero data.</text>
  </g>

  <!-- LEFT: webpage with a selection + context menu -->
  <g transform="translate(78,210)">
    <rect width="520" height="470" rx="14" fill="#ffffff" stroke="#d0d7de" stroke-width="1.5"/>
    <rect width="520" height="44" rx="14" fill="#eef1f4"/>
    <rect y="30" width="520" height="14" fill="#eef1f4"/>
    <circle cx="24" cy="22" r="6" fill="#ff5f57"/>
    <circle cx="44" cy="22" r="6" fill="#febc2e"/>
    <circle cx="64" cy="22" r="6" fill="#28c840"/>
    <text x="92" y="27" font-size="13" fill="#8c959f" font-family="ui-monospace, Menlo, monospace">example.com/docs</text>

    <text x="34" y="98" font-size="26" font-weight="700" fill="#1f2328">Getting Started</text>
    <text x="34" y="140" font-size="16" fill="#3d444d">Grabdown turns any web content into</text>
    <!-- selected line -->
    <rect x="30" y="152" width="430" height="26" rx="4" fill="#aed5b9"/>
    <text x="34" y="171" font-size="16" fill="#1f2328">clean Markdown — headings, code, and tables</text>
    <text x="34" y="202" font-size="16" fill="#3d444d">all preserved, ready to paste anywhere.</text>

    <!-- context menu -->
    <g transform="translate(180,214)">
      <rect width="290" height="132" rx="10" fill="#ffffff" stroke="#d0d7de" stroke-width="1.5"/>
      <rect x="8" y="10" width="274" height="34" rx="7" fill="#1a7f37"/>
      <text x="22" y="32" font-size="15" font-weight="600" fill="#ffffff">Copy selection as Markdown</text>
      <text x="22" y="70" font-size="15" fill="#57606a">Copy link as Markdown</text>
      <text x="22" y="104" font-size="15" fill="#57606a">Copy page as Markdown</text>
    </g>
  </g>

  <!-- arrow -->
  <g transform="translate(612,430)">
    <path d="M0 18 H44 M44 18 L30 4 M44 18 L30 32" stroke="#1a7f37" stroke-width="7" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- RIGHT: markdown result (editor) -->
  <g transform="translate(682,210)" font-family="ui-monospace, Menlo, monospace">
    <rect width="520" height="470" rx="14" fill="#0d1117" stroke="#30363d" stroke-width="1.5"/>
    <rect width="520" height="44" rx="14" fill="#161b22"/>
    <rect y="30" width="520" height="14" fill="#161b22"/>
    <text x="22" y="28" font-size="13" fill="#7d8590">clipboard · markdown</text>

    <g font-size="17">
      <text x="30" y="92" fill="#7ee787" font-weight="700">## Getting Started</text>
      <text x="30" y="134" fill="#e6edf3">Grabdown turns any web</text>
      <text x="30" y="160" fill="#e6edf3">content into <tspan fill="#ffa657">`clean Markdown`</tspan>.</text>

      <text x="30" y="206" fill="#e6edf3">- Headings, <tspan fill="#d2a8ff">**bold**</tspan>, links</text>
      <text x="30" y="232" fill="#e6edf3">- Fenced code blocks</text>
      <text x="30" y="258" fill="#e6edf3">- Nested lists</text>

      <text x="30" y="312" fill="#7d8590">| Feature | Kept |</text>
      <text x="30" y="338" fill="#7d8590">| --- | --- |</text>
      <text x="30" y="364" fill="#e6edf3">| Tables&#160;&#160;| &#10003;&#160;&#160;&#160;|</text>
      <text x="30" y="390" fill="#e6edf3">| Code&#160;&#160;&#160;| &#10003;&#160;&#160;&#160;|</text>
    </g>
    <rect x="30" y="420" width="180" height="30" rx="15" fill="#1a7f37"/>
    <text x="48" y="440" font-size="14" fill="#ffffff" font-family="-apple-system, sans-serif">Copied ✓</text>
  </g>

  <!-- footer brand -->
  <g transform="translate(640,742)" text-anchor="middle">
    <text font-size="20" fill="#57606a"><tspan font-weight="800" fill="#1a7f37">Grabdown</tspan>  ·  Chrome · Edge · Firefox  ·  open source</text>
  </g>
</svg>
